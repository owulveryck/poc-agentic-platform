 data-entity-2="part3" id="msg5"><line style="stroke:#0E2356;stroke-width:1;" x1="664.0581" x2="706.0581" y1="298.12" y2="298.12"/><line style="stroke:#0E2356;stroke-width:1;" x1="706.0581" x2="706.0581" y1="298.12" y2="311.12"/><line style="stroke:#0E2356;stroke-width:1;" x1="665.0581" x2="706.0581" y1="311.12" y2="311.12"/><polygon fill="#0E2356" points="675.0581,307.12,665.0581,311.12,675.0581,315.12,671.0581,311.12" style="stroke:#0E2356;stroke-width:1;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="6.72" x="671.0581" y="293">5</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="145.878" x="681.7781" y="293">v&#233;rifie signature + TTL : OK</text></g><g class="message" data-entity-1="part3" data-entity-2="part3" id="msg6"><line style="stroke:#0E2356;stroke-width:1;" x1="664.0581" x2="706.0581" y1="370.48" y2="370.48"/><line style="stroke:#0E2356;stroke-width:1;" x1="706.0581" x2="706.0581" y1="370.48" y2="383.48"/><line style="stroke:#0E2356;stroke-width:1;" x1="665.0581" x2="706.0581" y1="383.48" y2="383.48"/><polygon fill="#0E2356" points="675.0581,379.48,665.0581,383.48,675.0581,387.48,671.0581,383.48" style="stroke:#0E2356;stroke-width:1;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="6.876" x="671.0581" y="350.24">6</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="151.5651" x="681.9341" y="335.12">cible &#8712; scope.allow_modify ?</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="149.91" x="684.4241" y="350.24">&#8594; NON (le plan n'incluait que</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="153.231" x="684.4241" y="365.36">internal/payment/router.go)</text></g><g class="message" data-entity-1="part3" data-entity-2="part2" id="msg7"><polygon fill="#0E2356" points="361.77,484.2,351.77,488.2,361.77,492.2,357.77,488.2" style="stroke:#0E2356;stroke-width:1;"/><line style="stroke:#0E2356;stroke-width:1;stroke-dasharray:2,2;" x1="355.77" x2="663.0581" y1="488.2" y2="488.2"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="6.324" x="367.77" y="445.28">7</text><text fill="#EA4335" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="160.95" x="378.094" y="407.48">{"permissionDecision": "deny",</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="154.992" x="380.584" y="422.6">"permissionDecisionReason":</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="276.474" x="380.584" y="437.72">"OUT_OF_PLAN_SCOPE: \"internal/auth/login.go\"</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="164.919" x="380.584" y="452.84">n'est pas dans le plan verrouill&#233;</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="233.529" x="380.584" y="467.96">(autoris&#233;s : internal/payment/router.go, ...).</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="161.967" x="380.584" y="483.08">Rien n'a &#233;t&#233; modifi&#233;."}&lt;/color&gt;</text></g><path d="M355,505.2 L355,612.2 A4,4 0 0 0 359,616.2 L624,616.2 A4,4 0 0 0 628,612.2 L628,511.2 L618,501.2 L359,501.2 A4,4 0 0 0 355,505.2" fill="#FFF0F0" style="stroke:#FFD966;stroke-width:0.5;"/><path d="M618,501.2 L618,509.2 A2,2 0 0 0 620,511.2 L628,511.2 L618,501.2" fill="#FFF0F0" style="stroke:#FFD966;stroke-width:0.5;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="252.654" x="361" y="518.2">Refus D&#201;TERMINISTE, avant tout appel du tool.</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="149.988" x="361" y="533.32">Z&#233;ro d&#233;g&#226;t, z&#233;ro nettoyage.</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="2.49" x="361" y="548.44">&#160;</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="189.345" x="361" y="563.56">Le message est adress&#233; au mod&#232;le :</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="157.404" x="361" y="578.68">il nomme la cible refus&#233;e, liste</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="185.679" x="361" y="593.8">le scope autoris&#233;, indique le chemin</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="208.035" x="361" y="608.92">de sortie (re-planifier via lock_in_plan).</text><g class="message" data-entity-1="part2" data-entity-2="part1" id="msg8"><polygon fill="#0E2356" points="57.623,654.28,47.623,658.28,57.623,662.28,53.623,658.28" style="stroke:#0E2356;stroke-width:1;"/><line style="stroke:#0E2356;stroke-width:1;" x1="51.623" x2="349.77" y1="658.28" y2="658.28"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="6.744" x="63.623" y="645.6">8</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="223.071" x="74.367" y="638.04">"Cette modification n'est pas dans le plan.</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="266.913" x="76.857" y="653.16">Voulez-vous re-planifier ou rester dans le scope ?"</text></g><path d="M616,675.28 L616,737.28 A4,4 0 0 0 620,741.28 L888,741.28 A4,4 0 0 0 892,737.28 L892,681.28 L882,671.28 L620,671.28 A4,4 0 0 0 616,675.28" fill="#E6F4EA" style="stroke:#FFD966;stroke-width:0.5;"/><path d="M882,671.28 L882,679.28 A2,2 0 0 0 884,68