xtLength="185.29" x="570.36" y="785.62">signe et retourne un JWT en cas de succ&#232;s</text></g><!--entity Tools--><g class="entity" data-qualified-name="PPG.Tools" data-source-line="46" id="ent0027"><rect fill="#F1F1F1" height="61.58" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="227.115" x="298.44" y="736.64"/><text fill="#0E2356" font-family="'Outfit'" font-size="13" lengthAdjust="spacing" textLength="79.2188" x="308.44" y="759.64">/tools/{name}</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" lengthAdjust="spacing" textLength="205.04" x="308.44" y="773.02">tools sandbox&#233;s (patch_code, db-migration...)</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" lengthAdjust="spacing" textLength="146.83" x="308.44" y="785.62">qui v&#233;rifient le ticket c&#244;t&#233; serveur</text></g><!--entity Validate--><g class="entity" data-qualified-name="PPG.Validate" data-source-line="47" id="ent0028"><rect fill="#F1F1F1" height="61.58" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="203.595" x="800.2" y="736.64"/><text fill="#0E2356" font-family="'Outfit'" font-size="13" lengthAdjust="spacing" textLength="79.2057" x="810.2" y="759.64">/validate_skill</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" lengthAdjust="spacing" textLength="124.7625" x="810.2" y="773.02">gate de publication des skills</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" lengthAdjust="spacing" textLength="183.595" x="810.2" y="785.62">(nom, description, tier, Rego compagnon)</text></g><!--entity Debt--><g class="entity" data-qualified-name="PPG.Debt" data-source-line="48" id="ent0029"><rect fill="#F1F1F1" height="61.58" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="226.15" x="1038.93" y="736.64"/><text fill="#0E2356" font-family="'Outfit'" font-size="13" lengthAdjust="spacing" textLength="76.0858" x="1048.93" y="759.64">/debt_report</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" lengthAdjust="spacing" textLength="206.15" x="1048.93" y="773.02">ratio des artefacts amplifier vs compensatory,</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" lengthAdjust="spacing" textLength="142.13" x="1048.93" y="785.62">indicateur de dette de transition</text></g><!--entity ADR--><g class="entity" data-qualified-name="ADR" data-source-line="52" id="ent0030"><path d="M290.07,938.02 C290.07,928.02 412.0025,928.02 412.0025,928.02 C412.0025,928.02 533.935,928.02 533.935,938.02 L533.935,988.6 C533.935,998.6 412.0025,998.6 412.0025,998.6 C412.0025,998.6 290.07,998.6 290.07,988.6 L290.07,938.02" fill="#E8F0FE" style="stroke:#6D9EEB;stroke-width:0.5;"/><path d="M290.07,938.02 C290.07,948.02 412.0025,948.02 412.0025,948.02 C412.0025,948.02 533.935,948.02 533.935,938.02" fill="none" style="stroke:#6D9EEB;stroke-width:0.5;"/><text fill="#0E2356" font-family="'Outfit'" font-size="13" lengthAdjust="spacing" textLength="71.1198" x="300.07" y="965.02">Corpus ADR</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" font-style="italic" lengthAdjust="spacing" textLength="168.7175" x="300.07" y="978.4">adr/*.md (prose) + adr/*.rego (r&#232;gles)</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" font-style="italic" lengthAdjust="spacing" textLength="223.865" x="300.07" y="991">chaque ADR a deux moiti&#233;s : humaine + ex&#233;cutable</text></g><!--entity SkillGov--><g class="entity" data-qualified-name="SkillGov" data-source-line="53" id="ent0031"><path d="M785.65,938.02 C785.65,928.02 901.9962,928.02 901.9962,928.02 C901.9962,928.02 1018.3425,928.02 1018.3425,938.02 L1018.3425,988.6 C1018.3425,998.6 901.9962,998.6 901.9962,998.6 C901.9962,998.6 785.65,998.6 785.65,988.6 L785.65,938.02" fill="#E8F0FE" style="stroke:#6D9EEB;stroke-width:0.5;"/><path d="M785.65,938.02 C785.65,948.02 901.9962,948.02 901.9962,948.02 C901.9962,948.02 1018.3425,948.02 1018.3425,938.02" fill="none" style="stroke:#6D9EEB;stroke-width:0.5;"/><text fill="#0E2356" font-family="'Outfit'" font-size="13" lengthAdjust="spacing" textLength="96.6355" x="795.65" y="965.02">Skill Governance</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" font-style="italic" lengthAdjust="spacing" textLength="106.3275" x="795.65" y="978.4">skill-governance/*.rego</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" font-style="italic" lengthAdjust="spacing" textLength="212.6925" x="795.65" y="991">r&#232;gles structurelles + s&#233;curit&#233; pour la publication</text></g><g class="entity" data-qualified-name="GMN49" data-source-line="77" id="ent0050"><path d="M1120.68,924.51 L1120.68,1002.11 A4,4 0 0 0 1124.68,1006.11 L1475.3211,1006.11 A4,4 0 0 0 1479.3211,1002.11 L1479.3211,930.51 L1469.3211,920.51 L1124.68,920.51 A4,4 0 0 0 1120.68,924.51" fill="#FFEDB8" style="stroke:#FFD966;stroke-width:0.5;"/><path d="M1469.3211,920.51 L1469.3211,928.51 A2,2 0 0 0 1471.3211,930.51 L1479.3211,930.51 L1469.3211,920.51" fill="#FFEDB8" style="stroke:#FFD966;stroke-width:1;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="96.729" x="1126.68" y="937.51">La gateway est un</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="94.596" x="1225.899" y="937.51">service HTTP pur</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="115.443" x="1322.985" y="937.51">: elle ne touche jamais</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="267.1111" x="1126.68" y="952.63">au disque du projet. Toute la mat&#233;rialisation locale</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="301.9711" x="1126.68" y="967.75">(.ppg-ticket, hooks, tokens) est faite par les adaptateurs.</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="337.6411" x="1126.68" y="982.87">Une m&#234;me gateway peut ainsi servir plusieurs projets, machines</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="278.9041" x="1126.68" y="997.99">ou organisations sans jamais avoir acc&#232;s &#224; leur code.</text></g><g class="entity" data-qualified-name="GMN52" data-source-line="85" id="ent0053"><path d="M685.84,438.45 L685.84,516.05 A4,4 0 0 0 689.84,520.05 L998.1571,520.05 A4,4 0 0 0 1002.1571,516.05 L1002.1571,444.45 L992.1571,434.45 L689.84,434.45 A4,4 0 0 0 685.84,438.45" fill="#E6F4EA" style="stroke:#FFD966;stroke-width:0.5;"/><path d="M992.1571,434.45 L992.1571,442.45 A2,2 0 0 0 994.1571,444.45 L1002.1571,444.45 L992.1571,434.45" fill="#E6F4EA" style="stroke:#FFD966;stroke-width:1;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="120.006" x="691.84" y="451.45">Adaptateurs machine</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="161.226" x="814.336" y="451.45">= binaires g&#233;n&#233;riques, install&#233;s</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="295.3171" x="691.84" y="466.57">une fois pour toutes (tutoriel 0). Ils ne connaissent aucun</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="95.511" x="691.84" y="481.69">skill en particulier.</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="240.7531" x="691.84" y="496.81">Le contrat entre l'agent et un hook est trivial :</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="172.854" x="691.84" y="511.93">JSON sur stdin, JSON sur stdout.</text></g><g class="entity" data-qualified-name="GMN55" data-source-line="93" id="ent0056"><path d="M3072.91,713.51 L3072.91,821.35 A4,4 0 0 0 3076.91,825.35 L3411.0871,825.35 A4,4 0 0 0 3415.0871,821.35 L3415.0871,719.51 L3405.0871,709.51 L3076.91,709.51 A4,4 0 0 0 3072.91,713.51" fill="#E6F4EA" style="stroke:#FFD966;stroke-width:0.5;"/><path d="M3405.0871,709.51 L3405.0871,717.51 A2,2 0 0 0 3407.0871,719.51 L3415.0871,719.51 L3405.0871,709.51" fill="#E6F4EA" style="stroke:#FFD966;stroke-width:1;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="231.6661" x="3078.91" y="726.51">Un skill peut embarquer ses propres hooks</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="46.632" x="3313.0661" y="726.51">dans son</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="321.1771" x="3078.91" y="741.63">dossier hooks/. Son bootstrap (premi&#232;re &#233;tape du SKILL.md)</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="290.3491" x="3078.91" y="756.75">&#233;crit un .github/hooks/*.json qui pointe vers le script du</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="243.3391" x="3078.91" y="771.87">skill. La garde vit et meurt avec le skill : elle est</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="217.068" x="3078.91" y="786.99">livr&#233;e, versionn&#233;e et d&#233;sinstall&#233;e avec lui.</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="317.9161" x="3078.91" y="802.11">C'est le cas de design-guard.sh, sp&#233;cifique au design system</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="72.15" x="3078.91" y="817.23">Deep Umbra.</text></g><!--link Loop to Instr--><g class="link" data-entity-1="ent0018" data-entity-2="ent0010" data-link-type="dependency" data-source-line="56" id="lnk32"><path d="M2130.44,146.17 C2318.72,175 2791.66,275.93 2997,581.04 C3008.3875,59