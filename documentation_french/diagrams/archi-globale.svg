xt><text fill="#0E2356" font-family="'Outfit'" font-size="10" lengthAdjust="spacing" textLength="185.29" x="995.68" y="678.02">signe et retourne un JWT en cas de succ&#232;s</text></g><!--entity Tools--><g class="entity" data-qualified-name="PPG.Tools" data-source-line="47" id="ent0028"><rect fill="#F1F1F1" height="61.58" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="227.115" x="485.76" y="629.04"/><text fill="#0E2356" font-family="'Outfit'" font-size="13" lengthAdjust="spacing" textLength="79.2188" x="495.76" y="652.04">/tools/{name}</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" lengthAdjust="spacing" textLength="205.04" x="495.76" y="665.42">tools sandbox&#233;s (patch_code, db-migration...)</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" lengthAdjust="spacing" textLength="146.83" x="495.76" y="678.02">qui v&#233;rifient le ticket c&#244;t&#233; serveur</text></g><!--entity Validate--><g class="entity" data-qualified-name="PPG.Validate" data-source-line="48" id="ent0029"><rect fill="#F1F1F1" height="61.58" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="203.595" x="747.52" y="629.04"/><text fill="#0E2356" font-family="'Outfit'" font-size="13" lengthAdjust="spacing" textLength="79.2057" x="757.52" y="652.04">/validate_skill</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" lengthAdjust="spacing" textLength="124.7625" x="757.52" y="665.42">gate de publication des skills</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" lengthAdjust="spacing" textLength="183.595" x="757.52" y="678.02">(nom, description, tier, Rego compagnon)</text></g><!--entity Debt--><g class="entity" data-qualified-name="PPG.Debt" data-source-line="49" id="ent0030"><rect fill="#F1F1F1" height="61.58" rx="4" ry="4" style="stroke:#181818;stroke-width:0.5;" width="226.15" x="1226.25" y="629.04"/><text fill="#0E2356" font-family="'Outfit'" font-size="13" lengthAdjust="spacing" textLength="76.0858" x="1236.25" y="652.04">/debt_report</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" lengthAdjust="spacing" textLength="206.15" x="1236.25" y="665.42">ratio des artefacts amplifier vs compensatory,</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" lengthAdjust="spacing" textLength="142.13" x="1236.25" y="678.02">indicateur de dette de transition</text></g><!--entity ADR--><g class="entity" data-qualified-name="ADR" data-source-line="53" id="ent0031"><path d="M399.39,905.82 C399.39,895.82 521.3225,895.82 521.3225,895.82 C521.3225,895.82 643.255,895.82 643.255,905.82 L643.255,956.4 C643.255,966.4 521.3225,966.4 521.3225,966.4 C521.3225,966.4 399.39,966.4 399.39,956.4 L399.39,905.82" fill="#E8F0FE" style="stroke:#6D9EEB;stroke-width:0.5;"/><path d="M399.39,905.82 C399.39,915.82 521.3225,915.82 521.3225,915.82 C521.3225,915.82 643.255,915.82 643.255,905.82" fill="none" style="stroke:#6D9EEB;stroke-width:0.5;"/><text fill="#0E2356" font-family="'Outfit'" font-size="13" lengthAdjust="spacing" textLength="71.1198" x="409.39" y="932.82">Corpus ADR</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" font-style="italic" lengthAdjust="spacing" textLength="168.7175" x="409.39" y="946.2">adr/*.md (prose) + adr/*.rego (r&#232;gles)</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" font-style="italic" lengthAdjust="spacing" textLength="223.865" x="409.39" y="958.8">chaque ADR a deux moiti&#233;s : humaine + ex&#233;cutable</text></g><!--entity SkillGov--><g class="entity" data-qualified-name="SkillGov" data-source-line="54" id="ent0032"><path d="M677.97,905.82 C677.97,895.82 794.3162,895.82 794.3162,895.82 C794.3162,895.82 910.6625,895.82 910.6625,905.82 L910.6625,956.4 C910.6625,966.4 794.3162,966.4 794.3162,966.4 C794.3162,966.4 677.97,966.4 677.97,956.4 L677.97,905.82" fill="#E8F0FE" style="stroke:#6D9EEB;stroke-width:0.5;"/><path d="M677.97,905.82 C677.97,915.82 794.3162,915.82 794.3162,915.82 C794.3162,915.82 910.6625,915.82 910.6625,905.82" fill="none" style="stroke:#6D9EEB;stroke-width:0.5;"/><text fill="#0E2356" font-family="'Outfit'" font-size="13" lengthAdjust="spacing" textLength="96.6355" x="687.97" y="932.82">Skill Governance</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" font-style="italic" lengthAdjust="spacing" textLength="106.3275" x="687.97" y="946.2">skill-governance/*.rego</text><text fill="#0E2356" font-family="'Outfit'" font-size="10" font-style="italic" lengthAdjust="spacing" textLength="212.6925" x="687.97" y="958.8">r&#232;gles structurelles + s&#233;curit&#233; pour la publication</text></g><g class="entity" data-qualified-name="GMN50" data-source-line="78" id="ent0051"><path d="M6,892.31 L6,969.91 A4,4 0 0 0 10,973.91 L360.6411,973.91 A4,4 0 0 0 364.6411,969.91 L364.6411,898.31 L354.6411,888.31 L10,888.31 A4,4 0 0 0 6,892.31" fill="#FFEDB8" style="stroke:#FFD966;stroke-width:0.5;"/><path d="M354.6411,888.31 L354.6411,896.31 A2,2 0 0 0 356.6411,898.31 L364.6411,898.31 L354.6411,888.31" fill="#FFEDB8" style="stroke:#FFD966;stroke-width:1;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="96.729" x="12" y="905.31">La gateway est un</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" font-weight="bold" lengthAdjust="spacing" textLength="94.596" x="111.219" y="905.31">service HTTP pur</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="115.443" x="208.305" y="905.31">: elle ne touche jamais</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="267.1111" x="12" y="920.43">au disque du projet. Toute la mat&#233;rialisation locale</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="301.9711" x="12" y="935.55">(.ppg-ticket, hooks, tokens) est faite par les adaptateurs.</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="337.6411" x="12" y="950.67">Une m&#234;me gateway peut ainsi servir plusieurs projets, machines</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="278.9041" x="12" y="965.79">ou organisations sans jamais avoir acc&#232;s &#224; leur code.</text></g><g class="entity" data-qualified-name="GMN53" data-source-line="86" id="ent0054"><path d="M862.9,418.01 L862.9,480.49 A4,4 0 0 0 866.9,484.49 L1191.7471,484.49 A4,4 0 0 0 1195.7471,480.49 L1195.7471,424.01 L1185.7471,414.01 L866.9,414.01 A4,4 0 0 0 862.9,418.01" fill="#E6F4EA" style="stroke:#FFD966;stroke-width:0.5;"/><path d="M1185.7471,414.01 L1185.7471,422.01 A2,2 0 0 0 1187.7471,424.01 L1195.7471,424.01 L1185.7471,414.01" fill="#E6F4EA" style="stroke:#FFD966;stroke-width:1;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="270.606" x="868.9" y="431.01">Les adaptateurs sont install&#233;s une fois par machine</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="278.0521" x="868.9" y="446.13">(tutoriel 0). Ils sont &#233;crits en Go (les gardes de scope)</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="311.8471" x="868.9" y="461.25">ou en shell (les gardes de contenu). Le contrat entre l'agent</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="287.3011" x="868.9" y="476.37">et un hook est trivial : JSON sur stdin, JSON sur stdout.</text></g><!--link Loop to Instr--><g class="link" data-entity-1="ent0018" data-entity-2="ent0010" data-link-type="dependency" data-source-line="57" id="lnk33"><path d="M1977.49,138.51 C2198.88,146.6 2808.32,176.46 2808.32,259.97 C2808.32,259.97 2808.32,259.97 2808.32,660.83 C2808.32,771.99 2970.53,674.03 3036.32,763.62 C3047.175,778.4025 3053.8988,795.9925 3057.8672,814.1128 C3059.8514,823.173 3061.1468,832.3657 3061.9254,841.4064 C3062.12,843.6665 3062.2823,845.9172 3062.415,848.1539 C3062.4814,849.2723 3062.2604,879.3737 3062.3123,880.4845" fill="none" id="Loop-to-Instr" style="stroke:#0E2356;stroke-width:1;"/><polygon fill="#0E2356" points="3062.5923,886.4779,3066.1679,877.3011,3062.3589,881.4834,3058.1767,877.6744,3062.5923,886.4779" style="stroke:#0E2356;stroke-width:1;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="9.753" x="2828.103" y="446.25">lit</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="47.319" x="2809.32" y="461.37">(contrat)</text></g><!--link Loop to Skills--><g class="link" data-entity-1="ent0018" data-entity-2="ent0003" data-link-type="dependency" data-source-line="58" id="lnk34"><path d="M1977.75,140.06 C2017.38,146.06 2063.35,159.61 2094.32,189.48 C2117.94,212.26 2116.32,227.15 2116.32,259.97 C2116.32,259.97 2116.32,259.97 2116.32,537.54 C2116.32,643.28 2069.98,679.68 1977.32,730.62 C1963.59,738.17 1426.33,753.57 1414.32,763.62 C1399.9575,775.6375 1390.2419,791.8231 1383.7558,809.3975 C1382.1343,813.7911 1380.7146,818.2715 1379.4746,822.7952 C1378.8546,825.0571 1378.2795,827.3298 1377.7466,829.608 C1377.4802,830.747 1377.2243,831.8875 1376.9786,833.0286 C1376.9171,833.3138 1378.0941,879.0882 1378.034,879.3736" fill="none" id="Loop-to-Skills" style="stroke:#0E2356;stroke-width:1;"/><polygon fill="#0E2356" points="1376.7962,885.2445,1382.5668,877.2633,1377.8277,880.3521,1374.7389,875.6129,1376.7962,885.2445" style="stroke:#0E2356;stroke-width:1;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="78.615" x="2129.3245" y="446.25">invoque un skill</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="102.624" x="2117.32" y="461.37">(/design-system ...)</text></g><!--link Loop to MCPClient--><g class="link" data-entity-1="ent0018" data-entity-2="ent0019" data-link-type="dependency" data-source-line="59"