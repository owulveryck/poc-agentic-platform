;"/><path d="M432.445,965.9 L432.445,973.9 A2,2 0 0 0 434.445,975.9 L442.445,975.9 L432.445,965.9" fill="#FFEDB8" style="stroke:#FFD966;stroke-width:1;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="257.895" x="169.55" y="982.9">Extension optionnelle : un skill peut EMBARQUER</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="228.351" x="169.55" y="998.02">ses propres hooks (comme design-system).</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="238.89" x="169.55" y="1013.14">Son bootstrap (premi&#232;re &#233;tape de SKILL.md)</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="225.363" x="169.55" y="1028.26">copie tokens.css et enregistre le hook dans</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="199.806" x="169.55" y="1043.38">.github/hooks/. Le skill s'auto-installe.</text></g><g class="entity" data-qualified-name="GMN31" data-source-line="52" id="ent0032"><path d="M461.69,66.08 L461.69,158.8 A4,4 0 0 0 465.69,162.8 L708.304,162.8 A4,4 0 0 0 712.304,158.8 L712.304,72.08 L702.304,62.08 L465.69,62.08 A4,4 0 0 0 461.69,66.08" fill="#E6F4EA" style="stroke:#FFD966;stroke-width:0.5;"/><path d="M702.304,62.08 L702.304,70.08 A2,2 0 0 0 704.304,72.08 L712.304,72.08 L702.304,62.08" fill="#E6F4EA" style="stroke:#FFD966;stroke-width:1;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="174.147" x="467.69" y="79.08">Trois gates dans le mod&#232;le cible :</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="198.282" x="467.69" y="94.2">1 (Publish) &#8212; impl&#233;ment&#233; dans la PoC.</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="184.596" x="467.69" y="109.32">2 (Install) &#8212; &#224; faire : re-v&#233;rification</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="205.593" x="475.16" y="124.44">contre policies &#233;ventuellement durcies.</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="199.857" x="467.69" y="139.56">3 (Runtime) &#8212; &#224; faire : le linter du plan</text><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="222.144" x="475.16" y="154.68">&#233;value aussi le SKILL.rego du skill invoqu&#233;.</text></g><!--link Auteur to Pkg--><g class="link" data-entity-1="ent0010" data-entity-2="ent0002" data-link-type="dependency" data-source-line="25" id="lnk15"><path d="M171.21,132.73 C225.08,157.1 303,204.59 303,275.45 C303,275.45 303,275.45 303,544.58 C303,571.03 303,599.1081 303,626.4111 C303,640.0626 303,653.5203 303,666.4838 C303,668.1042 303,663.7169 303,665.3213" fill="none" id="Auteur-to-Pkg" style="stroke:#0E2356;stroke-width:1;"/><polygon fill="#0E2356" points="303,671.3213,307,662.3213,303,666.3213,299,662.3213,303,671.3213" style="stroke:#0E2356;stroke-width:1;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="149.754" x="304" y="420.66">&#233;crit SKILL.md + SKILL.rego</text></g><!--link Auteur to Gate1--><g class="link" data-entity-1="ent0010" data-entity-2="ent0011" data-link-type="dependency" data-source-line="26" id="lnk16"><path d="M123.44,136.65 C126.25,163.51 130.3042,202.0927 133.5942,233.4627" fill="none" id="Auteur-to-Gate1" style="stroke:#0E2356;stroke-width:1;"/><polygon fill="#0E2356" points="134.22,239.43,137.2594,230.0619,133.6985,234.4573,129.3031,230.8963,134.22,239.43" style="stroke:#0E2356;stroke-width:1;"/><text fill="#0E2356" font-family="'Outfit'" font-size="12" lengthAdjust="spacing" textLength="99.444" x="132.02" y="205.8">soumet le package</text></g><!--link Gate1 to Pub--><g class="link" data-entity-1="ent0011" da