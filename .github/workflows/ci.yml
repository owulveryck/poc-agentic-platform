name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build, vet, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
      - name: Test (race)
        run: go test -race -count=1 ./...

  redteam:
    name: Integration — red-team bypass harness (19 checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install binaries
        run: |
          make install BINDIR="$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Configure git for the harness' temp repos
        run: |
          git config --global user.email "ci@example.invalid"
          git config --global user.name "CI"
          git config --global init.defaultBranch main
      - name: Run red-team harness
        run: bash scripts/redteam-bypass.sh

  service-catalog:
    name: Integration — service catalog demo (13 checks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install binaries
        run: |
          make install BINDIR="$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Configure git for the harness' temp repos
        run: |
          git config --global user.email "ci@example.invalid"
          git config --global user.name "CI"
          git config --global init.defaultBranch main
      - name: Run service catalog harness
        run: bash scripts/service-catalog-demo.sh
